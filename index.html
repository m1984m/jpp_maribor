<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPP Maribor — Vizualizacija javnega prometa</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚌</text></svg>">
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Loading screen -->
    <div id="loading-screen">
        <div class="loading-container">
            <div class="loading-icon">🚌</div>
            <h1>JPP Maribor</h1>
            <p>Vizualizacija javnega potniškega prometa</p>
            <div class="loading-bar"><div class="loading-fill"></div></div>
            <span id="loading-status">Nalagam podatke...</span>
        </div>
    </div>

    <!-- Map screen -->
    <div id="map-screen" class="hidden">
        <div id="map"></div>

        <!-- Sidebar -->
        <div id="sidebar">
            <div class="sidebar-header">
                <h3>Linije</h3>
                <div class="day-filter">
                    <button class="day-btn active" data-day="mon">D</button>
                    <button class="day-btn" data-day="sat">S</button>
                    <button class="day-btn" data-day="sun">N</button>
                </div>
            </div>
            <div class="toggle-buttons">
                <button id="select-all-btn">Vse</button>
                <button id="deselect-all-btn">Nobena</button>
            </div>
            <div id="route-list"></div>
            <div class="sidebar-stats">
                <div id="stats-info"></div>
            </div>
        </div>

        <!-- Follow banner -->
        <div id="follow-banner" class="hidden">
            <span id="follow-info"></span>
            <button id="follow-close">✕</button>
        </div>

        <!-- Timeline -->
        <div id="timeline">
            <div class="timeline-row">
                <div class="timeline-controls">
                    <button id="play-btn" title="Predvajaj / Pavza">▶</button>
                    <button id="reset-btn" title="Na začetek">⏮</button>
                    <select id="speed-select" title="Hitrost animacije">
                        <option value="0.5">0.5x</option>
                        <option value="1" selected>1x</option>
                        <option value="2">2x</option>
                        <option value="5">5x</option>
                        <option value="10">10x</option>
                        <option value="30">30x</option>
                        <option value="60">60x</option>
                    </select>
                    <div class="line-width-control" title="Debelina linij">
                        <label for="line-width-slider">━</label>
                        <input type="range" id="line-width-slider" min="1" max="20" step="0.5" value="3">
                    </div>
                </div>
                <div id="time-display">04:00</div>
            </div>
            <input type="range" id="time-slider" min="14400" max="86400" step="1" value="14400">
            <div class="timeline-labels">
                <span>04:00</span>
                <span>08:00</span>
                <span>12:00</span>
                <span>16:00</span>
                <span>20:00</span>
                <span>00:00</span>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/deck.gl@9.1.7/dist.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
