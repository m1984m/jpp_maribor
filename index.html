<!DOCTYPE html>
<html>
<head>
    <title>Zemljevid vozil</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="sidebar">
        <h3>Linije</h3>
        <div class="toggle-buttons">
            <button id="select-all-btn">Vklopi vse</button>
            <button id="deselect-all-btn">Odstrani vse</button>
            <button id="select-plus-btn">Vsi plus</button>
            <button id="deselect-plus-btn">Izklopi plus</button>
            <button id="select-minus-btn">Vsi minus</button>
            <button id="deselect-minus-btn">Izklopi minus</button>
        </div>
        <ul id="vehicle-list"></ul>
    </div>
    <div id="map" style="height: 100vh; width: 100%; position: absolute; top: 0; left: 0;"></div>
    <div id="timeline">
        <button id="play-btn">Predvajaj</button>
        <button id="stop-btn">Ustavi</button>
        <button id="reset-btn">Ponastavi</button>
        <select id="speed-select">
            <option value="1">5x</option>
            <option value="8">2x</option>
            <option value="9">1x</option>
        </select>
        <input type="range" id="time-slider" min="0" max="100" step="0.01" value="0">
        <span id="time-display"></span>
    </div>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCzhjYj-t2ixZ9FHRjFxoFLPE6U1ysOPCM&callback=initMap" async defer></script>
    <script src="script.js"></script>
</body>
</html>
